<!DOCTYPE html>
<html>
<head>
  <title>Slideshow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slideshow {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
    }

    .slide.active {
      display: block;
    }

    img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    .dots {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin: 4px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
    }

    .dot.active {
      background: #fff;
    }
  </style>
</head>
<body>

  <div class="slideshow">
    <div class="slide active">
      <img src="https://raw.githubusercontent.com/Brianboi98/Hello/main/86034137-980d-468b-a0ee-55e065d4d719.jpeg">
    </div>
    <div class="slide">
      <img src="https://raw.githubusercontent.com/Brianboi98/Hello/main/IMG_6773.jpeg">
    </div>
    <div class="slide">
      <img src="https://raw.githubusercontent.com/Brianboi98/Hello/main/IMG_6775.jpeg">
    </div>

    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <script>
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');

    function showSlide(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    setInterval(() => showSlide(current + 1), 3000);

    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => showSlide(i));
    });
  </script>

</body>
</html>
